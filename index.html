<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Medição de Válvulas do Scania-550</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* (SEU CSS ORIGINAL — NÃO ALTERADO) */
body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; background-color: #fff; }
h1,h2,h3{ margin-top:20px; margin-bottom:10px; }
h1{ font-size:24px; text-align:center; border-bottom:3px solid #257500; padding-bottom:10px; color: #fff; background-color: #257500; border-radius:8px; }
.valve-container{ display:flex; flex-wrap:wrap; justify-content:space-between; margin-bottom:20px; }
.valve-section{ border:2px solid #257500; padding:15px; margin-bottom:20px; width:32%; box-sizing:border-box; background-color:#fff; border-radius:10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
.measurement{ text-align:center; margin:10px 0; font-size:18px; background-color:#FFFACD; border-radius:8px; padding:5px; font-weight:bold; color:black; }
input[type="text"], input[type="date"], textarea{ width:120px; padding:8px; text-align:center; font-size:16px; border:2px solid #FF8C00; border-radius:4px; }
textarea{ width:100%; height:100px; padding:10px; text-align:left; resize:vertical; border:2px solid #FF8C00; border-radius:6px; }
.info-table{ width:100%; margin-bottom:20px; }
.info-table td{ padding:5px 0; text-align:left; }
.signature{ margin-top:50px; border-top:2px solid #FF8C00; width:320px; padding-top:5px; text-align:center; font-weight:bold; font-size:16px; position:relative; }
#assinatura{ position:absolute; top:-36px; left:0; width:320px; border:none; font-size:28px; text-align:center; background:transparent; outline:none; font-family:'Brush Script MT', cursive, Arial, sans-serif; color:#257500; }
.warning{ background-color:#257500; padding:10px; text-align:center; color:white; font-weight:bold; border-radius:6px; }
.button-container{ margin-top:20px; text-align:center; }
button{ background-color:#257500; color:white; border:none; padding:10px 20px; margin:0 10px; font-size:16px; border-radius:6px; cursor:pointer; font-weight:bold; }
.photo-box{ width:120px; height:120px; border:2px dashed #FF8C00; margin:10px auto; display:flex; align-items:center; justify-content:center; font-size:12px; position:relative; background-size:cover; background-position:center; }
.photo-box input{ position:absolute; width:100%; height:100%; opacity:0; cursor:pointer; }
</style>
</head>

<body>

<h1>MEDIÇÃO DAS VÁLVULAS DO SCANIA-550</h1>

<div class="valve-container">
<script>
const container=document.currentScript.parentNode;

for(let i=1;i<=6;i++){
const section=document.createElement('div');
section.className='valve-section';

section.innerHTML=`<h3>${i}º CILINDRO</h3>`;

['exaustao','admissao'].forEach(tipo=>{
for(let j=1;j<=2;j++){
section.innerHTML+=`
<div>
<input type="text" id="${tipo}${i}_${j}" placeholder="${tipo.toUpperCase()} ${j}">
<div class="photo-box" id="photo${tipo}${i}_${j}">
<input type="file" onchange="loadPhoto(event,'${tipo}${i}_${j}')">
</div>
</div>`;
}
});

const btn=document.createElement('button');
btn.innerText="GERAR JPG";
btn.onclick=()=>gerarJpgCilindro(i);

section.appendChild(btn);
container.appendChild(section);
}
</script>
</div>

<script>
function loadPhoto(event,id){
const box=document.getElementById('photo'+id);
const reader=new FileReader();
reader.onload=e=>{
box.style.backgroundImage=`url(${e.target.result})`;
};
reader.readAsDataURL(event.target.files[0]);
}

// --- FUNÇÃO PRINCIPAL CORRIGIDA ---
async function gerarJpgCilindro(i){

const canvas=document.createElement('canvas');
canvas.width=1280;
canvas.height=1900;

const ctx=canvas.getContext('2d');
ctx.fillStyle="#fff";
ctx.fillRect(0,0,1280,1900);

const fotos=[
`photoexaustao${i}_2`,
`photoadmissao${i}_2`,
`photoexaustao${i}_1`,
`photoadmissao${i}_1`
];

const pos=[
[0,0],
[640,0],
[0,950],
[640,950]
];

for(let j=0;j<4;j++){

const box=document.getElementById(fotos[j]);
const inputId=fotos[j].replace('photo','');
const input=document.getElementById(inputId);

// ✅ CORREÇÃO DO VALOR
let val=null;
if(input && input.value.trim()!==''){
val=parseFloat(input.value.replace(',','.').trim());
}

if(box && box.style.backgroundImage){

let imgUrl=box.style.backgroundImage.replace(/^url\(["']?/,'').replace(/["']?\)$/,'');
const img=new Image();
img.src=imgUrl;

await new Promise(r=>img.onload=r);

ctx.drawImage(img,pos[j][0],pos[j][1],640,950);

// 🔥 TEXTO VERMELHO CORRIGIDO
if(!isNaN(val) && val>=67.50){

ctx.fillStyle="white";
ctx.fillRect(pos[j][0]+50,pos[j][1]+50,540,60);

ctx.fillStyle="red";
ctx.font="bold 30px Arial";
ctx.textAlign="center";

ctx.fillText(
`AFUNDAMENTO (${val.toFixed(2).replace('.',',')}mm)`,
pos[j][0]+320,
pos[j][1]+90
);
}
}
}

// ✅ LIMPEZA CORRETA (FORA DO LOOP)
fotos.forEach(id=>{
const box=document.getElementById(id);
if(box){
box.style.backgroundImage='';
}
});

// download
const link=document.createElement('a');
link.download=`CILINDRO_${i}.jpg`;
link.href=canvas.toDataURL('image/jpeg');
link.click();
}
</script>

</body>
</html>
